<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中控技术智能问答系统</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        .chat-box { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .msg { margin: 10px 0; padding: 12px 20px; border-radius: 20px; max-width: 70%; word-break: break-word; }
        .user { background: #667eea; color: white; margin-left: auto; }
        .bot { background: #f0f0f0; color: #333; }
        .bot.knowledge { background: #e3f2fd; border-left: 3px solid #2196f3; }
        .bot.llm { background: #e8f5e9; border-left: 3px solid #4caf50; }
        .input-area { display: flex; gap: 10px; margin-top: 20px; }
        .input-area input { flex: 1; padding: 12px 20px; border: 2px solid #ddd; border-radius: 30px; font-size: 16px; outline: none; transition: border-color 0.3s; }
        .input-area input:focus { border-color: #667eea; }
        .input-area button { padding: 12px 30px; background: #667eea; color: white; border: none; border-radius: 30px; cursor: pointer; font-size: 16px; transition: background 0.3s; }
        .input-area button:hover { background: #5a6fd6; }
        h1 { text-align: center; color: white; margin-bottom: 20px; font-size: 24px; }
        .config-panel { background: #f8f9fa; border-radius: 10px; padding: 15px; margin-bottom: 15px; }
        .config-panel button { background: #4caf50; color: white; padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        .config-panel button:hover { background: #43a047; }
        .status { font-size: 12px; color: #666; margin-top: 5px; }
        .status.online { color: #4caf50; }
        .status.offline { color: #f44336; }
        #messages { max-height: 400px; overflow-y: auto; }
        .thinking { color: #999; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>中控技术智能问答系统</h1>
        <div class="chat-box">
            <div class="config-panel">
                <button onclick="testAPI()">测试AI连接</button>
                <div class="status" id="status">点击测试连接</div>
            </div>
            <div id="messages"></div>
            <div class="input-area">
                <input id="input" placeholder="请输入您的问题..." onkeyup="if(event.key=='Enter') send()">
                <button onclick="send()">发送</button>
            </div>
        </div>
    </div>
    <script>
        var API_URL = '/api/chat';
        
        var knowledgeBase = {
            'aop': '【知识库】中控技术全自主运行工厂系统AOP的核心技术体系由两部分组成：时间序列大模型TPT2作为智慧大脑，负责智能分析与决策；行业颠覆性通用控制系统UCS-Nyx作为敏捷身体，负责精准执行控制指令。',
            'tpt': '【知识库】TPT作为智慧大脑，主要解决流程工业中参数波动的毫秒级响应和工艺规律的复杂耦合等挑战，能在毫秒级波动中捕捉趋势，避免机器幻觉。',
            'ucs': '【知识库】UCS作为神经中枢和物理手脚，为TPT构建高质量的实时数据基座，确保数据的实时性、完整性和真实性，并作为执行层落实决策。',
            '客户': '【知识库】我们的合作客户包括兴发集团、兰州石化、万华化学等知名企业。',
            '董事长': '【知识库】中控技术的董事长是崔山先生，他拥有丰富的工业自动化领域经验。',
            '价值跃迁': '【知识库】TPT+UCS能实现三大价值跃迁：从多人值守转变为机器自主，从维持稳定转变为追逐最优，以及从被动防护转变为主动免疫。',
            '兰州石化': '【知识库】应用TPT后，异常预警准确率达到99.79%，投炉时长缩短25%，年综合效益提升超过1500万元。',
            '效率提升': '【知识库】在兴发集团下属湖北兴瑞公司，通过部署TPT+UCS，实现了人员效率提升67%，定员从260人减少到80人以下。'
        };

        function findKnowledge(query) {
            var lowerQ = query.toLowerCase();
            for (var key in knowledgeBase) {
                if (lowerQ.indexOf(key.toLowerCase()) !== -1) {
                    return knowledgeBase[key];
                }
            }
            return null;
        }

        async function callAI(query) {
            try {
                var response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'LongCat-Flash-Chat',
                        messages: [
                            {role: 'system', content: '你是中控技术的智能助手，请用中文回答问题。'},
                            {role: 'user', content: query}
                        ],
                        temperature: 0.7,
                        max_tokens: 500
                    })
                });

                if (!response.ok) {
                    throw new Error('API请求失败');
                }

                var data = await response.json();
                return '【AI回答】' + data.choices[0].message.content;
            } catch (error) {
                console.error('AI调用失败:', error);
                return '【提示】AI服务暂时不可用，请稍后重试。您可以问我关于中控技术AOP、TPT、UCS等相关问题。';
            }
        }

        async function testAPI() {
            var statusEl = document.getElementById('status');
            statusEl.textContent = '测试中...';
            statusEl.className = 'status';

            try {
                var response = await fetch(API_URL.replace('/api/chat', '/api/test'), { method: 'POST' });
                var data = await response.json();

                if (data.status === 'success') {
                    statusEl.textContent = '✓ AI连接成功！可以使用AI问答功能';
                    statusEl.className = 'status online';
                } else {
                    statusEl.textContent = '✗ AI连接失败: ' + (data.error || '未知错误');
                    statusEl.className = 'status offline';
                }
            } catch (error) {
                statusEl.textContent = '✗ AI连接失败: ' + error.message;
                statusEl.className = 'status offline';
            }
        }

        async function send() {
            var input = document.getElementById('input');
            var q = input.value.trim();
            if (!q) return;

            addMsg(q, true);
            input.value = '';

            var knowledge = findKnowledge(q);
            if (knowledge) {
                setTimeout(() => addMsg(knowledge, false, 'knowledge'), 300);
                return;
            }

            addMsg('正在思考...', false, 'thinking');

            var response = await callAI(q);
            var thinkingEl = document.querySelector('.msg.thinking');
            if (thinkingEl) thinkingEl.remove();

            addMsg(response, false, 'llm');
        }

        function addMsg(t, isUser, type='normal') {
            var el = document.createElement('div');
            el.className = 'msg ' + (isUser ? 'user' : 'bot ' + type);
            el.textContent = t;
            document.getElementById('messages').appendChild(el);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        addMsg('你好！欢迎来到中控技术智能问答系统。点击"测试AI连接"验证AI功能，或直接问我关于中控技术的问题。', false, 'knowledge');
    </script>
</body>
</html>
